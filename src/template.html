<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Battleships</title>
	</head>
	<body>
		<div id="game">
			<header id="status-bar">
				<div id="turn-indicator"></div>
				<div id="winner-banner" class="hidden"></div>
			</header>

			<main id="boards">
				<div class="board-wrapper">
					<h3>You</h3>
					<div id="player-board"></div>
				</div>

				<div class="board-wrapper">
					<h3>Enemy</h3>
					<div id="enemy-board"></div>
				</div>
			</main>

			<footer id="controls">
				<button id="start-game-btn">Start New Game</button>
				<button id="rotate-btn">Rotate (R)</button>
				<button id="auto-place-btn">Auto Place</button>
			</footer>
		</div>
	</body>
</html>
